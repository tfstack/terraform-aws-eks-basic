# Karpenter NodePool: interruptible batch capacity on general compute (C + M categories), spot-first
# with on-demand fallback (separate from GPU accelerated pool).
# Applied by karpenter-nodepool-batch-spot.tf only — do not merge into karpenter-nodepool-accelerated.yaml.
#
# Spot-first with on-demand fallback in ONE pool: requirements allow both capacity types; Karpenter
# prefers spot and falls back to on-demand when spot cannot satisfy provisioning (see Karpenter
# capacity-type priority). You cannot cap “max on-demand nodes” in this single pool — in a long
# spot outage, up to all nodes here could be on-demand until spot returns.
#
# EKS Auto Mode NodeClass: https://docs.aws.amazon.com/eks/latest/userguide/automode.html
apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: batch-spot
spec:
  # Prefer reclaiming underutilized capacity when budgets allow.
  disruption:
    budgets:
      - nodes: 25%
    consolidateAfter: 5m
    consolidationPolicy: WhenEmptyOrUnderutilized
  limits:
    nodes: 5
  template:
    metadata: {}
    spec:
      nodeClassRef:
        group: eks.amazonaws.com
        kind: NodeClass
        name: default
      requirements:
        - key: karpenter.sh/capacity-type
          operator: In
          values:
            - spot
            - on-demand
        - key: kubernetes.io/arch
          operator: In
          values:
            - amd64
        # General compute only: compute-optimized (c) + general-purpose (m). No burstable (t).
        # Tune for your org; keep disjoint from GPU g5/g6 families.
        - key: eks.amazonaws.com/instance-category
          operator: In
          values:
            - c
            - m
      taints:
        - key: devops.k8sforge/batch-spot
          effect: NoSchedule
      # 336h == 14 days; aligns with EKS Auto Mode default node lifetime (AWS “Create a Node Pool” → Disruption).
      expireAfter: 336h
      terminationGracePeriod: 10m0s
