# Karpenter NodePool for EKS Auto Mode accelerated workloads (NVIDIA g5/g6/g6e).
# https://docs.aws.amazon.com/eks/latest/userguide/auto-accelerated.html
apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: gpu
spec:
  # Cap voluntary disruption; reclaim empty nodes after idle window (saves GPU $).
  disruption:
    budgets:
      - nodes: 10%
    consolidateAfter: 1h
    consolidationPolicy: WhenEmpty
  template:
    metadata: {}
    spec:
      # Auto Mode built-in NodeClass (VPC/subnet/IAM already wired).
      nodeClassRef:
        group: eks.amazonaws.com
        kind: NodeClass
        name: default
      # On-demand NVIDIA (g5/g6/g6e); amd64 only — matches accelerated pool intent.
      requirements:
        - key: karpenter.sh/capacity-type
          operator: In
          values:
            - on-demand
        - key: kubernetes.io/arch
          operator: In
          values:
            - amd64
        - key: eks.amazonaws.com/instance-family
          operator: In
          values:
            - g5
            - g6e
            - g6
      # Only workloads that tolerate this taint land here (isolates GPU from generic pods).
      taints:
        - key: nvidia.com/gpu
          effect: NoSchedule
      # expireAfter: maximum time a node may stay before expiration replacement (ceiling; earlier
      # replacement still possible via consolidation, drift, AMI updates, budgets). 336h == 14 days,
      # matching EKS Auto Mode’s documented default for node lifetime (see AWS “Create a Node Pool”
      # → Disruption). https://karpenter.sh/docs/concepts/nodepools/#spectemplatespecexpireafter
      expireAfter: 336h
      # Long pre-stop window for GPU / batch jobs to exit cleanly before node teardown.
      terminationGracePeriod: 24h0m0s
